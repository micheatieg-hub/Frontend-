<!DOCTYPE html>
<html>
<head>
  <title>My Store</title>
</head>
<body>

<h1>My Online Store</h1>

<div id="products"></div>

<h2>Cart</h2>
<div id="cart"></div>

<button onclick="checkout()">Checkout</button>

<script>
const backendURL = "https://my-backend-1-tier.onrender.com";

let cart = [];

// LOAD PRODUCTS
function loadProducts() {
  // replace THIS with real userId later
  const userId = "OWNER_ID_HERE";

  fetch(`${backendURL}/products/${userId}`)
    .then(res => res.json())
    .then(data => {
      let html = "";

      data.forEach(p => {
        html += `
          <div style="border:1px solid #ccc; padding:10px; margin:10px;">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
            <button onclick='addToCart("${p.name}", ${p.price})'>
              Add to Cart
            </button>
          </div>
        `;
      });

      document.getElementById("products").innerHTML = html;
    });
}

// ADD TO CART
function addToCart(name, price) {
  cart.push({ name, price });
  renderCart();
}

// SHOW CART
function renderCart() {
  let html = "";

  cart.forEach((item, i) => {
    html += `<p>${item.name} - $${item.price}</p>`;
  });

  document.getElementById("cart").innerHTML = html;
}

// CHECKOUT
function checkout() {
  const token = localStorage.getItem("token");

  let total = cart.reduce((sum, i) => sum + i.price, 0);

  fetch(`${backendURL}/buy`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      items: cart,
      total: total
    })
  })
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    cart = [];
    renderCart();
  });
}

loadProducts();
</script>

</body>
</html>
