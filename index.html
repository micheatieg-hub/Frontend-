<!DOCTYPE html>
<html>
<head>
<title>AI SaaS Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f8fafc;
  color:#0f172a;
}

/* AUTH */
.center{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:white;
  padding:25px;
  border-radius:14px;
  width:340px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #e2e8f0;
}

button{
  background:#4f46e5;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#4338ca;
}

/* APP */
.app{
  display:none;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  height:100vh;
  background:white;
  position:fixed;
  border-right:1px solid #e2e8f0;
  padding:20px;
}

.sidebar h2{
  color:#4f46e5;
}

.nav button{
  background:none;
  border:none;
  width:100%;
  text-align:left;
  padding:10px;
  cursor:pointer;
  color:#334155;
  border-radius:8px;
}

.nav button:hover{
  background:#f1f5f9;
}

/* MAIN */
.main{
  margin-left:250px;
  padding:20px;
}

.page{
  display:none;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  margin-top:10px;
}

h2,h3{margin:0}
</style>
</head>

<body>

<!-- SIGNUP -->
<div id="signupPage" class="center">
  <div class="card">
    <h2>Sign Up</h2>
    <input id="su_email" placeholder="Email">
    <input id="su_password" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
    <p onclick="showLogin()" style="cursor:pointer;color:#4f46e5;">Login instead</p>
  </div>
</div>

<!-- LOGIN -->
<div id="loginPage" class="center" style="display:none;">
  <div class="card">
    <h2>Login</h2>
    <input id="li_email" placeholder="Email">
    <input id="li_password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p onclick="showForgot()" style="cursor:pointer;color:#4f46e5;">Forgot Password?</p>
    <p onclick="showSignup()" style="cursor:pointer;color:#4f46e5;">Create account</p>
  </div>
</div>

<!-- FORGOT -->
<div id="forgotPage" class="center" style="display:none;">
  <div class="card">
    <h2>Reset Password</h2>
    <input id="fp_email" placeholder="Enter email">
    <button onclick="forgot()">Send Email</button>
    <p onclick="showLogin()" style="cursor:pointer;color:#4f46e5;">Back</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="app">

  <div class="sidebar">
    <h2>⚡ SaaS</h2>

    <div class="nav">
      <button onclick="show('dashboard')">Dashboard</button>
      <button onclick="show('ai')">AI Builder</button>
      <button onclick="show('settings')">Settings</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
      <h2>Dashboard</h2>

      <div class="box">
        🚀 Welcome to your AI SaaS platform
      </div>
    </div>

    <!-- AI -->
    <div id="ai" class="page">
      <h2>AI Builder</h2>

      <div class="box">
        <input id="prompt" placeholder="Build a website (e.g gym landing page)">
        <button onclick="buildAI()">Generate Website</button>

        <textarea id="output" style="width:100%;height:200px;margin-top:10px;"></textarea>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="page">
      <h2>Settings</h2>

      <div class="box">
        <p>User Settings Panel</p>
        <button onclick="logout()">Logout Account</button>
      </div>
    </div>

  </div>
</div>

<script>
const backendURL = "https://my-backend-1-tier.onrender.com";

let token = localStorage.getItem("token");

/* SHOW PAGES */
function show(page){
  document.querySelectorAll(".page").forEach(p=>p.style.display="none");
  document.getElementById(page).style.display="block";
}

/* AUTH SWITCH */
function showLogin(){
  signupPage.style.display="none";
  loginPage.style.display="flex";
}
function showSignup(){
  loginPage.style.display="none";
  signupPage.style.display="flex";
}
function showForgot(){
  loginPage.style.display="none";
  forgotPage.style.display="flex";
}

/* SIGNUP */
function signup(){
  fetch(backendURL+"/signup",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      email:su_email.value,
      password:su_password.value
    })
  }).then(r=>r.json()).then(d=>{
    alert(d.message);
    showLogin();
  });
}

/* LOGIN */
function login(){
  fetch(backendURL+"/login",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      email:li_email.value,
      password:li_password.value
    })
  }).then(r=>r.json()).then(d=>{
    if(d.token){
      localStorage.setItem("token",d.token);
      app.style.display="block";
      loginPage.style.display="none";
      signupPage.style.display="none";
      forgotPage.style.display="none";
      show("dashboard");
    }else{
      alert(d.message);
    }
  });
}

/* FORGOT PASSWORD */
function forgot(){
  fetch(backendURL+"/forgot-password",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ email:fp_email.value })
  }).then(r=>r.json()).then(d=>{
    alert("Email sent if account exists");
    showLogin();
  });
}

/* LOGOUT */
function logout(){
  localStorage.clear();
  location.reload();
}

/* AI BUILDER */
function buildAI(){
  fetch(backendURL+"/ai/create-website",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":token
    },
    body:JSON.stringify({
      prompt:prompt.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    output.value = d.html;
  });
}

/* AUTO LOGIN */
if(token){
  app.style.display="block";
  loginPage.style.display="none";
  signupPage.style.display="none";
  forgotPage.style.display="none";
  show("dashboard");
}
</script>

</body>
</html>
