<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
}
button {
  background:#3b82f6;
  color:white;
}
</style>
</head>
<body>

<div class="card">
<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p onclick="location.href='signup.html'" style="cursor:pointer;color:#60a5fa;">
Create account
</p>
</div>

<script>
const backendURL = "https://my-backend-1-tier.onrender.com";

async function login() {
  const res = await fetch(backendURL + "/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();

  if(data.token){
    localStorage.setItem("token", data.token);
    localStorage.setItem("role", data.role);
    window.location.href = "index.html";
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
