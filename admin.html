<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<style>
body{font-family:Arial;background:#0f172a;color:white}
.container{padding:20px}
.card{background:#111827;padding:20px;border-radius:12px}
button{padding:10px;background:red;color:white;border:none}
</style>
</head>
<body>

<div class="container">
<h2>Admin Panel</h2>

<div class="card">
<button onclick="loadOrders()">Load Orders</button>
<pre id="out"></pre>
</div>

</div>

<script>
const backendURL = "https://my-backend-1-tier.onrender.com";
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

if(role !== "admin"){
  alert("Admin only");
  location.href="index.html";
}

async function loadOrders(){
  const res = await fetch(backendURL+"/admin/orders", {
    headers:{ "Authorization":token }
  });

  const data = await res.json();
  out.innerText = JSON.stringify(data,null,2);
}
</script>

</body>
</html>
