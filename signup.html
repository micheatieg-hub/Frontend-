<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card {
  background:#111827;
  padding:30px;
  border-radius:12px;
  width:300px;
}
input, button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}
button {
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="card">
<h2>Create Account</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<p onclick="location.href='login.html'" style="cursor:pointer;color:#60a5fa;">
Already have account? Login
</p>
</div>

<script>
const backendURL = "https://my-backend-1-tier.onrender.com";

async function signup() {
  const res = await fetch(backendURL + "/signup", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  alert(data.message);
  if(data.message === "Account created") {
    window.location.href = "login.html";
  }
}
</script>

</body>
</html>
